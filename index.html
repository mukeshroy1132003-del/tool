<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Ledger — Budget Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --cover: #241E52;
    --cover-dark: #16123A;
    --brass: #D4AF37;
    --brass-dim: #a8872a;
    --paper: #F3EFE2;
    --paper-line: #DCD5C0;
    --ink: #232043;
    --ink-soft: #6b6680;
    --income: #2E7D5B;
    --expense: #A13D3D;
    --radius: 3px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background: var(--cover);
    background-image:
      radial-gradient(circle at 15% 10%, rgba(255,255,255,0.03), transparent 40%),
      radial-gradient(circle at 85% 90%, rgba(255,255,255,0.03), transparent 40%);
    font-family: 'Inter', sans-serif;
    color: var(--ink);
    min-height: 100vh;
    padding: 32px 16px 64px;
  }
  .wrap{ max-width: 880px; margin: 0 auto; }

  /* Cover title */
  .cover-title{
    text-align:center;
    margin-bottom: 22px;
  }
  .cover-title .eyebrow{
    font-family:'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--brass);
    text-transform: uppercase;
  }
  .cover-title h1{
    font-family:'Fraunces', serif;
    font-optical-sizing: auto;
    font-weight: 600;
    font-size: 44px;
    color: var(--paper);
    margin: 4px 0 0;
    letter-spacing: 0.5px;
  }

  /* Page panel */
  .page{
    background: var(--paper);
    border-radius: var(--radius);
    box-shadow: 0 20px 50px rgba(0,0,0,0.35);
    padding: 36px;
    position: relative;
  }
  .page::before{
    content:"";
    position:absolute; inset:10px;
    border: 1px solid var(--paper-line);
    pointer-events:none;
    border-radius: 2px;
  }

  /* Balance stamp */
  .stamp-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap: 24px;
    flex-wrap: wrap;
    margin-bottom: 30px;
  }
  .stamp{
    width: 148px; height: 148px;
    border-radius: 50%;
    border: 3px double currentColor;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    transform: rotate(-6deg);
    transition: color 0.4s ease, border-color 0.4s ease;
    flex-shrink:0;
  }
  .stamp .label{
    font-family:'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    opacity: 0.75;
  }
  .stamp .amt{
    font-family:'Fraunces', serif;
    font-weight: 700;
    font-size: 22px;
    margin-top: 4px;
  }
  .stamp.positive{ color: var(--income); }
  .stamp.negative{ color: var(--expense); }

  .stats{
    display:flex; gap: 28px; flex-wrap: wrap;
  }
  .stat .k{
    font-family:'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--ink-soft);
  }
  .stat .v{
    font-family:'IBM Plex Mono', monospace;
    font-size: 22px;
    font-weight: 600;
    margin-top: 2px;
  }
  .stat.income .v{ color: var(--income); }
  .stat.expense .v{ color: var(--expense); }

  hr.rule{
    border: none;
    border-top: 1px solid var(--paper-line);
    margin: 28px 0;
  }

  /* Form */
  h2.section-title{
    font-family:'Fraunces', serif;
    font-weight: 600;
    font-size: 19px;
    margin: 0 0 14px;
  }
  form.entry{
    display:grid;
    grid-template-columns: 1.6fr 1fr 1fr 1fr auto;
    gap: 10px;
    align-items:end;
  }
  @media (max-width: 680px){
    form.entry{ grid-template-columns: 1fr 1fr; }
  }
  .field{ display:flex; flex-direction:column; gap:5px; }
  .field label{
    font-family:'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--ink-soft);
  }
  .field input, .field select{
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    padding: 9px 10px;
    border: 1px solid var(--paper-line);
    border-radius: var(--radius);
    background: #fffdf8;
    color: var(--ink);
  }
  .field input:focus, .field select:focus{
    outline: 2px solid var(--brass);
    outline-offset: 1px;
  }
  .toggle{
    display:flex;
    border: 1px solid var(--paper-line);
    border-radius: var(--radius);
    overflow:hidden;
  }
  .toggle button{
    flex:1;
    border:none;
    padding: 9px 0;
    font-family:'Inter', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor:pointer;
    background: #fffdf8;
    color: var(--ink-soft);
  }
  .toggle button.active[data-type="income"]{ background: var(--income); color:#fff; }
  .toggle button.active[data-type="expense"]{ background: var(--expense); color:#fff; }

  button.add-btn{
    background: var(--cover);
    color: var(--paper);
    border: none;
    border-radius: var(--radius);
    padding: 10px 18px;
    font-family:'Inter', sans-serif;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    white-space: nowrap;
  }
  button.add-btn:hover{ background: var(--cover-dark); }

  /* Ledger table */
  table.ledger{
    width:100%;
    border-collapse: collapse;
    margin-top: 8px;
  }
  table.ledger thead th{
    text-align:left;
    font-family:'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--ink-soft);
    padding: 8px 6px;
    border-bottom: 2px solid var(--ink);
  }
  table.ledger tbody tr{
    border-bottom: 1px solid var(--paper-line);
  }
  table.ledger tbody tr:hover{ background: rgba(201,162,75,0.08); }
  table.ledger td{
    padding: 10px 6px;
    font-size: 14px;
    vertical-align: middle;
  }
  td.amount{
    font-family:'IBM Plex Mono', monospace;
    font-weight: 600;
    text-align:right;
    white-space:nowrap;
  }
  td.amount.income{ color: var(--income); }
  td.amount.expense{ color: var(--expense); }
  td.cat span{
    font-family:'IBM Plex Mono', monospace;
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 20px;
    background: rgba(43,36,26,0.07);
    color: var(--ink-soft);
  }
  .del-btn{
    background:none; border:none; cursor:pointer;
    color: var(--ink-soft);
    font-size: 16px;
    line-height:1;
  }
  .del-btn:hover{ color: var(--expense); }
  .empty-row td{
    text-align:center;
    padding: 30px 0;
    color: var(--ink-soft);
    font-style: italic;
  }

  /* Category bars */
  .cat-bars{ margin-top: 6px; }
  .cat-bar-row{
    display:grid;
    grid-template-columns: 110px 1fr 70px;
    align-items:center;
    gap: 10px;
    margin-bottom: 10px;
  }
  .cat-bar-row .name{ font-size:13px; }
  .cat-bar-track{
    height: 8px;
    background: var(--paper-line);
    border-radius: 4px;
    overflow:hidden;
  }
  .cat-bar-fill{
    height:100%;
    background: var(--brass);
    border-radius: 4px;
  }
  .cat-bar-row .amt{
    font-family:'IBM Plex Mono', monospace;
    font-size: 12px;
    text-align:right;
    color: var(--ink-soft);
  }

  .toolbar{
    display:flex; gap:10px; justify-content:flex-end; margin-top: 22px;
  }
  .ghost-btn{
    background: none;
    border: 1px solid var(--paper-line);
    color: var(--ink-soft);
    font-family:'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 8px 14px;
    border-radius: var(--radius);
    cursor: pointer;
  }
  .ghost-btn:hover{ border-color: var(--brass); color: var(--ink); }
  input[type="file"]{ display:none; }

  .note{
    font-size: 12px;
    color: var(--ink-soft);
    margin-top: 10px;
    text-align:right;
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="cover-title">
    <div class="eyebrow">Est. Today · Double-Entry Since Forever</div>
    <h1>The Ledger</h1>
  </div>

  <div class="page">
    <div class="stamp-row">
      <div class="stamp positive" id="balanceStamp">
        <div class="label">Balance</div>
        <div class="amt" id="balanceAmt">$0.00</div>
      </div>
      <div class="stats">
        <div class="stat income">
          <div class="k">Total Income</div>
          <div class="v" id="totalIncome">$0.00</div>
        </div>
        <div class="stat expense">
          <div class="k">Total Expense</div>
          <div class="v" id="totalExpense">$0.00</div>
        </div>
        <div class="stat">
          <div class="k">Entries</div>
          <div class="v" id="totalCount">0</div>
        </div>
      </div>
    </div>

    <hr class="rule">

    <h2 class="section-title">New Entry</h2>
    <form class="entry" id="entryForm">
      <div class="field">
        <label for="desc">Description</label>
        <input type="text" id="desc" placeholder="e.g. Groceries" required>
      </div>
      <div class="field">
        <label for="amount">Amount</label>
        <input type="number" id="amount" step="0.01" min="0" placeholder="0.00" required>
      </div>
      <div class="field">
        <label for="category">Category</label>
        <select id="category">
          <option>Food</option>
          <option>Housing</option>
          <option>Transport</option>
          <option>Utilities</option>
          <option>Health</option>
          <option>Fun</option>
          <option>Salary</option>
          <option>Other</option>
        </select>
      </div>
      <div class="field">
        <label>Type</label>
        <div class="toggle" id="typeToggle">
          <button type="button" data-type="expense" class="active">Expense</button>
          <button type="button" data-type="income">Income</button>
        </div>
      </div>
      <button type="submit" class="add-btn">Add Entry</button>
    </form>

    <hr class="rule">

    <h2 class="section-title">Ledger</h2>
    <table class="ledger">
      <thead>
        <tr>
          <th>Date</th>
          <th>Description</th>
          <th>Category</th>
          <th style="text-align:right;">Amount</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="ledgerBody"></tbody>
    </table>

    <hr class="rule">

    <h2 class="section-title">By Category</h2>
    <div class="cat-bars" id="catBars"></div>

    <div class="toolbar">
      <button class="ghost-btn" id="exportBtn">Export Ledger (.json)</button>
      <label class="ghost-btn" for="importFile" style="display:inline-block;">Import Ledger</label>
      <input type="file" id="importFile" accept="application/json">
      <button class="ghost-btn" id="clearBtn">Clear All</button>
    </div>
    <div class="note">Data lives in this page only — export to keep it, import to bring it back next time.</div>
  </div>
</div>

<script>
  let entries = [];
  let currentType = 'expense';

  const fmt = (n) => (n < 0 ? '-₹' : '₹') + Math.abs(n).toLocaleString('en-IN', {minimumFractionDigits:2, maximumFractionDigits:2});

  const typeToggle = document.getElementById('typeToggle');
  typeToggle.addEventListener('click', (e) => {
    const btn = e.target.closest('button');
    if (!btn) return;
    currentType = btn.dataset.type;
    [...typeToggle.children].forEach(b => b.classList.toggle('active', b === btn));
  });

  document.getElementById('entryForm').addEventListener('submit', (e) => {
    e.preventDefault();
    const desc = document.getElementById('desc').value.trim();
    const amount = parseFloat(document.getElementById('amount').value);
    const category = document.getElementById('category').value;
    if (!desc || isNaN(amount) || amount <= 0) return;

    entries.unshift({
      id: crypto.randomUUID ? crypto.randomUUID() : Date.now() + Math.random(),
      desc, amount, category, type: currentType,
      date: new Date().toISOString().slice(0,10)
    });

    document.getElementById('desc').value = '';
    document.getElementById('amount').value = '';
    render();
  });

  document.getElementById('clearBtn').addEventListener('click', () => {
    if (entries.length && !confirm('Clear all entries? This cannot be undone.')) return;
    entries = [];
    render();
  });

  document.getElementById('exportBtn').addEventListener('click', () => {
    const blob = new Blob([JSON.stringify(entries, null, 2)], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'ledger-export.json';
    a.click();
    URL.revokeObjectURL(url);
  });

  document.getElementById('importFile').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const data = JSON.parse(reader.result);
        if (Array.isArray(data)) {
          entries = data;
          render();
        } else {
          alert('That file doesn\'t look like a valid ledger export.');
        }
      } catch {
        alert('Could not read that file.');
      }
    };
    reader.readAsText(file);
    e.target.value = '';
  });

  function render(){
    const income = entries.filter(x => x.type === 'income').reduce((s,x)=>s+x.amount,0);
    const expense = entries.filter(x => x.type === 'expense').reduce((s,x)=>s+x.amount,0);
    const balance = income - expense;

    document.getElementById('totalIncome').textContent = fmt(income);
    document.getElementById('totalExpense').textContent = fmt(expense);
    document.getElementById('totalCount').textContent = entries.length;
    document.getElementById('balanceAmt').textContent = fmt(balance);

    const stamp = document.getElementById('balanceStamp');
    stamp.classList.toggle('positive', balance >= 0);
    stamp.classList.toggle('negative', balance < 0);

    const body = document.getElementById('ledgerBody');
    body.innerHTML = '';
    if (entries.length === 0){
      body.innerHTML = '<tr class="empty-row"><td colspan="5">No entries yet — add your first one above.</td></tr>';
    } else {
      entries.forEach(entry => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${entry.date}</td>
          <td>${escapeHtml(entry.desc)}</td>
          <td class="cat"><span>${entry.category}</span></td>
          <td class="amount ${entry.type}">${entry.type === 'income' ? '+' : '−'}${fmt(entry.amount)}</td>
          <td><button class="del-btn" title="Delete" data-id="${entry.id}">✕</button></td>
        `;
        body.appendChild(tr);
      });
      body.querySelectorAll('.del-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          entries = entries.filter(x => x.id != btn.dataset.id);
          render();
        });
      });
    }

    // category breakdown (expenses only)
    const catTotals = {};
    entries.filter(x => x.type === 'expense').forEach(x => {
      catTotals[x.category] = (catTotals[x.category] || 0) + x.amount;
    });
    const maxCat = Math.max(1, ...Object.values(catTotals));
    const catBars = document.getElementById('catBars');
    const sorted = Object.entries(catTotals).sort((a,b) => b[1]-a[1]);
    if (sorted.length === 0){
      catBars.innerHTML = '<div class="note" style="text-align:left;">No expenses logged yet.</div>';
    } else {
      catBars.innerHTML = sorted.map(([cat, amt]) => `
        <div class="cat-bar-row">
          <div class="name">${cat}</div>
          <div class="cat-bar-track"><div class="cat-bar-fill" style="width:${(amt/maxCat*100).toFixed(1)}%"></div></div>
          <div class="amt">${fmt(amt)}</div>
        </div>
      `).join('');
    }
  }

  function escapeHtml(str){
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  render();
</script>
</body>
</html>
